<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>VTX Check Web</title>
  <link rel="icon" type="image/x-icon" href="icon-vtx.ico">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="header-logo">VTX <span>Check</span> Web</div>
    <div class="header-sub">Extrator de dados de dispositivos mobiles</div>
  </header>
  <div class="container">

    <div class="drop-zone" id="dropZone">
      <div class="drop-placeholder" id="placeholderText">
        <div class="drop-icon">📱</div>
        <div class="drop-label">Toque para escolher ou fotografar</div>
      </div>
      <img id="imagePreview" alt="Pré-visualização">
    </div>
    <input type="file" id="imageInput" accept="image/*">

    <div class="btn-row">
      <button class="btn btn-upload" id="btnUpload">📁 Escolher / Foto</button>
      <button class="btn btn-extract" id="btnCapturar" disabled>🪄 Extrair</button>
    </div>

    <div class="status-bar" id="statusBar"><div class="dot"></div><span id="statusMsg">Aguardando imagem...</span></div>
    <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>

    <div>
      <div class="field-label">Modelo de Script</div>
      <textarea id="scriptTemplate">SMARTPHONE {MODELO DO CELULAR}
SN: {SERIE}
IMEI 1: {IMEI 1}
IMEI 2: {IMEI 2}</textarea>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-header">
        <span>Dados extraídos</span>
        <span class="result-badge" id="resultBadge"></span>
      </div>
      <div class="result-fields" id="resultFields"></div>
      <button class="btn-copy-result" id="btnCopyResult">📋 Copiar Script Preenchido</button>
      <div class="result-raw">
        <button class="raw-toggle" id="rawToggle">▶ Ver texto bruto do OCR</button>
        <div class="raw-content" id="rawContent"></div>
      </div>
    </div>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
