<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTX Check Web</title>
    <link rel="icon" type="image/x-icon" href="vtx.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<div class="container">
    <h2 style="color: #d32f2f;">VTX Check Web</h2>
    
    <div class="image-wrapper" id="imageWrapper">
        <span id="placeholderText">Nenhuma foto selecionada</span>
        <img id="imagePreview" style="display:none;" alt="Pré-visualização">
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    
    <button id="btnUpload" class="btn-secondary">📁 Escolher ou Tirar Foto</button>

    <div id="statusMsg" class="status">Aguardando imagem...</div>

    <label><strong>Script de Colagem:</strong></label>
    <textarea id="scriptTemplate">SMARTPHONE {MODELO DO CELULAR}
SN: {SERIE}
IMEI 1: {IMEI 1}
IMEI 2: {IMEI 2}</textarea>

    <button id="btnCapturar" disabled>🪄 Extrair e Copiar Texto</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
